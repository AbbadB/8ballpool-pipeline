services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    # 9092 = internal listener for in-network services (dq, spark) via host "kafka".
    # 29092 = external listener for clients on the host machine via "localhost".
    # Two listeners are required because the broker tells clients which address to
    # use (advertised listeners); host clients can't resolve the docker hostname.
    ports: ["29092:29092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  producer:
    build: .
    command: python apps/producer.py
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  dq:
    build: .
    command: python apps/dq_app.py
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  spark-streaming:
    image: apache/spark:3.5.1
    # Run as root so Spark can write the checkpoint/output into the bind-mounted
    # ./output dir. The image's default UID 185 cannot create dirs in a
    # host-owned mount on Linux (works on Docker Desktop, fails on CI/Linux).
    user: root
    command: >
      /opt/spark/bin/spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      --conf spark.jars.ivy=/tmp/.ivy
      /app/apps/spark_streaming.py
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      PYTHONPATH: /app/src
    volumes:
      - ".:/app"
      - "./output:/output"
    depends_on:
      kafka:
        condition: service_healthy

  spark-batch:
    image: apache/spark:3.5.1
    user: root            # see spark-streaming: write into the bind-mounted ./output
    profiles: ["batch"]   # run on demand: docker compose run --rm spark-batch
    command: >
      /opt/spark/bin/spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      --conf spark.jars.ivy=/tmp/.ivy
      /app/apps/spark_batch.py
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      PYTHONPATH: /app/src
    volumes:
      - ".:/app"
      - "./output:/output"
    depends_on:
      kafka:
        condition: service_healthy
